name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel previous runs of the same PR when a new commit lands.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden-path:
    name: Golden path
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the Playwright browser binaries (~150 MB) keyed on the
      # @playwright/test version. A fresh install cold-starts on cache miss
      # via the test:e2e:install script.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npm run test:e2e:install

      # mongodb-memory-server downloads its mongod binary on first start.
      # Cache so re-runs skip the download.
      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: ${{ runner.os }}-mongo-mem-7

      - name: Build packages
        run: npm run build

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests (api)
        run: npm --workspace @ecom/api test

      - name: Run Playwright e2e
        env:
          CI: "true"
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results
          retention-days: 14
