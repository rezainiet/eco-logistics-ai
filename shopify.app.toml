# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "ConfirmX"
handle = "confirmx"
application_url = "https://api.confirmx.ai/api/shopify/install"
embedded = false
client_id = "c380acae5f8587b58971c5d5231fc673"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers_private_data,read_orders"
optional_scopes = [ "read_checkouts", "read_fulfillments", "read_products" ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://api.confirmx.ai/api/integrations/oauth/shopify/callback"
]

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "https://api.confirmx.ai/api/integrations/webhook/shopify"
  topics = [ "orders/create", "orders/updated", "app/uninstalled" ]

  # Mandatory GDPR / CCPA privacy webhooks. Shopify sends these to every
  # public app, signed with SHOPIFY_APP_API_SECRET. Receiver lives at
  # apps/api/src/server/webhooks/shopify-gdpr.ts and dispatches to
  # redactCustomer / redactShop. Each URL path is purely cosmetic — the
  # router reads the topic from the x-shopify-topic header.
  [webhooks.privacy_compliance]
  customer_deletion_url = "https://api.confirmx.ai/api/webhooks/shopify/gdpr/customers/redact"
  customer_data_request_url = "https://api.confirmx.ai/api/webhooks/shopify/gdpr/customers/data_request"
  shop_deletion_url = "https://api.confirmx.ai/api/webhooks/shopify/gdpr/shop/redact"
